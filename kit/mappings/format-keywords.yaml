  - keyword: pdb
    format_id: pdb
  - keyword: smiles
    format_id: smiles
  - keyword: sdf
    format_id: pdb
  - keyword: mol2
    format_id: pdb
  - keyword: json
    format_id: json
  - keyword: csv
    format_id: csv
  - keyword: tsv
    format_id: csv
  - keyword: xvg
    format_id: csv
  - keyword: npy
    format_id: npy
  - keyword: npz
    format_id: npy
  - keyword: python api
    format_id: python_api
  - keyword: python sdk
    format_id: python_api
