# 知识图谱节点类型定义
# 版本: v0.1
# 事实源: bioinformatics/model/*.md

version: "0.1"

# ---------------------------------------------------------------------------
# Model — 生物/化学领域神经网络模型与 Pipeline 编排体
# ---------------------------------------------------------------------------
Model:
  label: Model
  description: 基础模型、下游微调模型、端到端 Pipeline（如 BindCraft）
  subtypes:
    - foundation      # 通用基座（ESM2, RNA-FM）
    - downstream      # 任务专用（GearBind, CatPred）
    - pipeline        # 多模型编排（BindCraft）
  properties:
  # --- 标识 ---
    model_id:
      type: string
      required: true
      unique: true
      example: rnabpflow
    name:
      type: string
      required: true
    alias:
      type: array
      items: string
    version:
      type: string
    node_subtype:
      type: string
      enum: [foundation, downstream, pipeline]
      default: downstream

  # --- 描述 ---
    summary:
      type: text
      required: true
      max_length: 500
      description: 模型用途一句话摘要（取自 Markdown 概述首段或 **定位** 行）
      example: MSA-free RNA 3D 结构生成旗舰模型，碱基配对条件化 SE(3) 流匹配

  # --- 技术与分类 ---
    release_date:
      type: string
      format: partial-date
    parameter_count:
      type: string
    architecture_type:
      type: string
    multimodal:
      type: boolean
    commercial_use:
      type: string
      enum: [allowed, restricted, denied, unknown]
    organization:
      type: string
      description: 开发组织（内嵌属性，非图节点）
    framework:
      type: string
      description: 实现框架（内嵌属性）
    modalities:
      type: array
      items: string
      description: 输入模态列表（内嵌属性）

  # --- 溯源 ---
    source_path:
      type: string
      required: true
      description: 对应 bioinformatics 条目相对路径

  # --- 在线资源（嵌入，便于 UI 直出链接）---
    online_resources:
      $ref: online_resources.yaml#/node_embed_schema/online_resources
    online_resources_meta:
      $ref: online_resources.yaml#/node_embed_schema/online_resources_meta

# ---------------------------------------------------------------------------
# Tool — 非神经网络工具（预处理、模拟、注释、包装器）
# ---------------------------------------------------------------------------
Tool:
  label: Tool
  description: 模型依赖或常联用的软件、库、服务（GROMACS、DSSR、bpRNA、FoldX）
  properties:
  # --- 标识 ---
    tool_id:
      type: string
      required: true
      unique: true
      example: bprna
    name:
      type: string
      required: true
    alias:
      type: array
      items: string

  # --- 描述 ---
    summary:
      type: text
      required: true
      max_length: 300
      description: 工具功能的简短描述（1–3 句），说明做什么、在 pipeline 中扮演什么角色
      example: RNA 二级结构碱基配对注释工具，为 RNAbpFlow 等结构预测模型生成 bp 约束输入

  # --- 分类 ---
    tool_type:
      type: string
      required: true
      enum:
        - preprocessor    # 输入预处理（序列清洗、格式转换）
        - annotator       # 注释生成（碱基配对、GO、EC）
        - simulator       # 物理/分子模拟（GROMACS、AMBER）
        - scorer          # 能量/亲和力打分（FoldX、Rosetta）
        - wrapper         # 模型包装/一键部署（ColabFold）
        - md_engine       # 分子动力学引擎
        - cheminformatics # 化学信息学（RDKit）
        - database_client # 外部数据库客户端
    license:
      type: string

  # --- 溯源 ---
    source_path:
      type: string
      description: 若工具有独立 md 条目则填路径；从模型文中抽取则为 null

  # --- 在线资源 ---
    online_resources:
      $ref: online_resources.yaml#/node_embed_schema/online_resources
    online_resources_meta:
      $ref: online_resources.yaml#/node_embed_schema/online_resources_meta

# ---------------------------------------------------------------------------
# FileType — 输入/输出数据格式
# ---------------------------------------------------------------------------
FileType:
  label: FileType
  properties:
    format_id: { type: string, required: true, unique: true }
    name: { type: string, required: true }
    typical_extension: { type: array, items: string }
    description: { type: text }

# ---------------------------------------------------------------------------
# Paper — 论文 / 预印本
# ---------------------------------------------------------------------------
Paper:
  label: Paper
  properties:
    paper_id: { type: string, required: true, unique: true }
    title: { type: string, required: true }
    doi: { type: string }
    preprint_doi: { type: string }
    journal: { type: string }
    year: { type: integer }
    authors: { type: array, items: string }
    bibtex: { type: text }
    online_resources:
      type: object
      properties:
        paper_url: { type: string, format: uri }
        preprint_url: { type: string, format: uri }
        pdf_url: { type: string, format: uri }

# ---------------------------------------------------------------------------
# Dataset — 训练集 / 评测集 / 参考库
# ---------------------------------------------------------------------------
Dataset:
  label: Dataset
  properties:
    dataset_id: { type: string, required: true, unique: true }
    name: { type: string, required: true }
    dataset_type:
      type: string
      enum: [training, benchmark, reference, annotation]
    organizations:
      type: array
      items: string
      description: 关联模型的开发组织（聚合）
    modalities:
      type: array
      items: string
      description: 关联模型的输入模态（聚合）
    size_description: { type: string }
    release_date: { type: string }
    url: { type: string, format: uri }
    license_note: { type: string }
    description: { type: text }
    paper_doi: { type: string }
    scope: { type: string }
    composition: { type: string }
    splits: { type: string }
    preprocessing: { type: string }
    source_path: { type: string }

# ---------------------------------------------------------------------------
# Organization — 开发组织 / 实验室
# ---------------------------------------------------------------------------
Organization:
  label: Organization
  properties:
    org_id: { type: string, required: true, unique: true }
    name: { type: string, required: true }
    org_type: { type: string, enum: [academic, industry, consortium] }
    affiliation: { type: string }
    homepage: { type: string, format: uri }

# ---------------------------------------------------------------------------
# Ontology — 术语体系（GO / EC / 自建 Task / Modality）
# ---------------------------------------------------------------------------
Ontology:
  label: Ontology
  properties:
    term_id: { type: string, required: true, unique: true }
    name: { type: string, required: true }
    ontology_source:
      type: string
      enum: [GO, EC, custom_task, custom_modality, MeSH]
    definition: { type: text }
    parent_term_id: { type: string }

# ---------------------------------------------------------------------------
# 辅助节点（略写，详见 edges.yaml 查询场景）
# ---------------------------------------------------------------------------
Task:
  label: Task
  properties:
    task_id: { type: string, required: true, unique: true }
    name: { type: string, required: true }
    description: { type: text }

Category:
  label: Category
  properties:
    category_id: { type: string, required: true, unique: true }
    name: { type: string, required: true }

Modality:
  label: Modality
  properties:
    modality_id: { type: string, required: true, unique: true }
    name: { type: string, required: true }

Benchmark:
  label: Benchmark
  properties:
    benchmark_id: { type: string, required: true, unique: true }
    name: { type: string, required: true }

Metric:
  label: Metric
  properties:
    metric_id: { type: string, required: true, unique: true }
    name: { type: string, required: true }
    unit: { type: string }
    description: { type: text }
    quantity_kind: { type: string }
    domains:
      type: array
      items: string
    typical_range: { type: string }
    higher_is_better: { type: boolean }
    source_path: { type: string }

License:
  label: License
  properties:
    license_id: { type: string, required: true, unique: true }
    name: { type: string, required: true }
    commercial_use: { type: string }

Framework:
  label: Framework
  properties:
    framework_id: { type: string, required: true, unique: true }
    name: { type: string, required: true }

Repository:
  label: Repository
  description: 已内嵌为 Model/Tool.online_resources，不再作为图节点
  deprecated: true
  properties:
    repo_id: { type: string, required: true, unique: true }
    channel:
      type: string
      enum: [github, huggingface, zenodo, docker, colab, pypi, modelscope, homepage, other]
    url: { type: string, required: true }
    name: { type: string }

UseCaseTag:
  label: UseCaseTag
  properties:
    tag_id: { type: string, required: true, unique: true }
    name: { type: string, required: true }
